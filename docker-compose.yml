# Jits Library — self-hosted BJJ instructional organizer
# -------------------------------------------------------
# 1. Edit the media volume path below to point at your instructionals folder.
# 2. `docker compose up -d --build`
# 3. Open http://localhost:5000 → Scan library → Generate thumbnails.
services:
  jits-library:
    build: .
    image: jits-library:latest
    container_name: jits-library
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Your instructional videos (read-only — the app never writes here).
      # Change the left side to your host folder, e.g. /volume1/Media/Instructionals:/media:ro
      - /path/to/your/instructionals:/media:ro
      # Persistent DB + generated thumbnails (survives rebuilds).
      - jits-data:/data
    # The container runs as non-root uid/gid 1001 by default. If your NAS media
    # folder isn't readable by that user (Scan finds nothing), either grant
    # read+execute to uid 1001 on the host, or uncomment and set a user that can
    # read it (e.g. your NAS user's uid:gid, or "0:0" for a root test).
    # user: "0:0"
    environment:
      # Where the app looks for video files
      - MEDIA_DIR=/media
      # SQLite database location (on the persistent volume)
      - DB_PATH=/data/data.db
      # Where generated thumbnails are stored (on the persistent volume)
      - THUMBNAIL_DIR=/data/thumbnails
      # Web server port (inside container)
      - PORT=5000
      # Optional: populate 5 sample instructionals on first run (for trying the UI)
      # - DEMO_SEED=true
      # Optional: also generate thumbnails for remote http(s) video URLs
      # - ALLOW_REMOTE_THUMBNAILS=true
      # Optional: override the timezone for timestamps
      - TZ=America/Chicago

volumes:
  jits-data:
