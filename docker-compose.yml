# Jits Library — self-hosted BJJ instructional organizer
# -------------------------------------------------------
services:
  jits-library:
    build: .
    image: jits-library:latest
    container_name: jits-library
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Mount your instructional videos here (read-only is fine)
      - /path/to/your/instructionals:/media:ro
      # Persistent DB + generated assets
      - jits-data:/data
    environment:
      # Where the app looks for video files
      - MEDIA_DIR=/media
      # SQLite database location (on the persistent volume)
      - DB_PATH=/data/data.db
      # Web server port (inside container)
      - PORT=5000
      # Optional: override the timezone for timestamps
      - TZ=America/Chicago
    # Optional GPU/media passthrough can be added here

volumes:
  jits-data:
